modified: '2026-05-04'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Edge Hosting
description: FOCUS-aligned FinOps for Fly.io.
sources:
  - https://fly.io/docs/about/pricing/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Fly.io
serviceCategory: Edge Hosting
billingModel:
  pricingCategory: Pay-As-You-Go (Per-Second)
  billingFrequency: Monthly
  billingCurrency: USD
focusColumns:
  ServiceName: Fly.io
  ServiceCategory: Edge Hosting
  ProviderName: Fly.io
  PublisherName: Fly.io
  BillingCurrency: USD
meters:
  - name: machine_seconds
    unit: second
    aggregation: sum
    dimensions:
      - machine_size
      - region
  - name: rootfs_storage
    unit: GB-month
    aggregation: max
  - name: volumes
    unit: GB-month
    aggregation: max
  - name: snapshots
    unit: GB-month
    aggregation: max
  - name: egress
    unit: GB
    aggregation: sum
    dimensions:
      - region
  - name: ipv4_addresses
    unit: ip-month
    aggregation: max
  - name: managed_certificates
    unit: cert-month
    aggregation: max
principles:
  - name: Visibility
    description: Track Fly.io consumption monthly.
  - name: Allocation
    description: Tag usage to teams/cost centers.
  - name: Optimization
    description: Right-size; reclaim unused entitlements.
  - name: Accountability
    description: Set spend alerts; quarterly review.
